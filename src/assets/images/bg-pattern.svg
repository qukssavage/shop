<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180">
  <defs>
    <pattern id="p" x="0" y="0" width="180" height="180" patternUnits="userSpaceOnUse">

      <!-- Shopping bag (top-left) -->
      <g transform="translate(18,16)" opacity="0.07" fill="none" stroke="#6d28d9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 10 L2 30 Q2 32 4 32 L22 32 Q24 32 24 30 L24 10 Z"/>
        <path d="M7 10 C7 3 19 3 19 10"/>
        <circle cx="10" cy="20" r="1.5" fill="#6d28d9" stroke="none"/>
        <circle cx="16" cy="20" r="1.5" fill="#6d28d9" stroke="none"/>
      </g>

      <!-- Price tag (bottom-right) -->
      <g transform="translate(112,112)" opacity="0.07" fill="none" stroke="#6d28d9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 0 L18 0 L28 12 L18 24 L0 24 Z"/>
        <circle cx="7" cy="12" r="2.5" fill="#6d28d9" stroke="none"/>
      </g>

      <!-- 4-pointed sparkle (top-right) -->
      <g transform="translate(138,18)" opacity="0.1">
        <path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" fill="#7c3aed"/>
      </g>

      <!-- Small sparkle (bottom-left) -->
      <g transform="translate(18,130)" opacity="0.08">
        <path d="M7 0 L8.2 5 L14 7 L8.2 8.5 L7 14 L5.8 8.5 L0 7 L5.8 5 Z" fill="#7c3aed"/>
      </g>

      <!-- Percent badge (center, faint) -->
      <g transform="translate(70,65)" opacity="0.05" fill="none" stroke="#6d28d9" stroke-width="1.8" stroke-linecap="round">
        <circle cx="20" cy="20" r="18"/>
        <line x1="12" y1="28" x2="28" y2="12"/>
        <circle cx="13" cy="13" r="3" fill="#6d28d9" stroke="none"/>
        <circle cx="27" cy="27" r="3" fill="#6d28d9" stroke="none"/>
      </g>

      <!-- Accent dots -->
      <circle cx="90"  cy="12"  r="2.5" fill="#7c3aed" opacity="0.07"/>
      <circle cx="12"  cy="90"  r="2"   fill="#7c3aed" opacity="0.06"/>
      <circle cx="168" cy="90"  r="2"   fill="#7c3aed" opacity="0.06"/>
      <circle cx="90"  cy="168" r="2.5" fill="#7c3aed" opacity="0.07"/>
      <circle cx="155" cy="155" r="1.5" fill="#7c3aed" opacity="0.08"/>
      <circle cx="25"  cy="55"  r="1.5" fill="#7c3aed" opacity="0.07"/>

    </pattern>
  </defs>
  <rect width="180" height="180" fill="url(#p)"/>
</svg>
